<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estilo Cool – Tienda de Ropa</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <span class="logo-text">Estilo <span>Cool</span></span>
            </div>
            <nav class="nav" id="mainNav">
                <ul>
                    <li><a href="#productos" class="active">Productos</a></li>
                    <li><a href="#nosotros">Nosotros</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="cart-toggle" id="cartToggle" aria-label="Abrir carrito">
                    <span class="cart-icon">🛍️</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
                <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-content">
            <h1>Viste con <span>actitud</span></h1>
            <p>Descubre la coleccion mas cool de la temporada. Estilo, comodidad y personalidad.</p>
            <a href="#productos" class="btn-primary">Explorar ahora</a>
        </div>
    </section>

    <section id="productos" class="products-section">
        <div class="container">
            <h2 class="section-title">Nuestros Favoritos</h2>
            <div class="product-grid" id="productGrid"></div>
        </div>
    </section>

    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button class="cart-close" id="cartClose">✕</button>
        </div>
        <div class="cart-body" id="cartBody">
            <div class="cart-empty">No hay productos en el carrito.</div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>Total</span>
                <span id="totalAmountSidebar">$0.00</span>
            </div>
            <button class="btn-checkout" id="checkoutBtnSidebar">Comprar por WhatsApp</button>
        </div>
    </aside>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Estilo Cool – Hecho con amor para ti.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
